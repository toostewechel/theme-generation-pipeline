<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluid Typography Preview</title>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Fluid Typography Preview</h1>
      <p>Compose and preview fluid typography scales. Edit the config, scrub the viewport, copy the SCSS.</p>
    </header>

    <div class="scrubber-bar">
      <label for="viewport-scrubber">Viewport</label>
      <input type="range" id="viewport-scrubber" min="320" max="1440" value="960" />
      <span class="viewport-label" id="viewport-label">960px</span>
    </div>

    <div class="main">
      <div class="specimen-panel">
        <div id="error-display" class="error-display"></div>
        <div id="specimen"></div>
      </div>

      <aside class="sidebar">
        <div class="sidebar-section sidebar-section--graph">
          <div class="sidebar-header">
            <span class="sidebar-title">Scale Graph</span>
          </div>
          <div class="graph-container" id="graph-container"></div>
          <div class="graph-legend" id="graph-legend"></div>
        </div>

        <details class="sidebar-section sidebar-section--collapsible" open>
          <summary class="sidebar-header sidebar-summary">
            <span class="sidebar-title">Config</span>
            <button class="btn" id="reset-btn">Reset</button>
          </summary>
          <textarea class="config-editor" id="config-editor" spellcheck="false"></textarea>
        </details>

        <details class="sidebar-section sidebar-section--collapsible" open>
          <summary class="sidebar-header sidebar-summary">
            <span class="sidebar-title">SCSS Output</span>
            <button class="btn" id="copy-btn">Copy SCSS</button>
          </summary>
          <pre class="clamp-output" id="clamp-output"></pre>
        </details>
      </aside>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
